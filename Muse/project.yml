name: Muse
options:
  bundleIdPrefix: com.atakan.muse
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  Muse:
    type: application
    platform: iOS
    sources:
      - Muse
    settings:
      base:
        DEVELOPMENT_TEAM: BTYNKLQT43
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: com.atakan.muse
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Muse needs microphone access for voice challenges"
        INFOPLIST_KEY_NSCameraUsageDescription: "Muse needs camera access for photo challenges"
