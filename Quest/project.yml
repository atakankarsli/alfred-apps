name: Quest
options:
  bundleIdPrefix: com.atakan.quest
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  Quest:
    type: application
    platform: iOS
    sources:
      - Quest
    settings:
      base:
        DEVELOPMENT_TEAM: BTYNKLQT43
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: com.atakan.quest
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Quest needs your location to discover nearby missions and track exploration progress."
        INFOPLIST_KEY_NSCameraUsageDescription: "Quest needs camera access for photo missions."
